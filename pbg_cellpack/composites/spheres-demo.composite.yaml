name: spheres-demo
description: "Minimal cellPACK packing demo: 8 single-sphere ingredients jittered into a 300 nm cube. Emits the packed sphere count and packing fraction."

requires:
  processes: [CellPackStep, RAMEmitter]

parameters:
  seed:
    type: int
    default: 42
    description: "Random seed driving stochastic placement; wired into the packer's seed input."
  place_method:
    type: string
    default: "jitter"
    description: "cellPACK placement algorithm. 'jitter' is the standard random-jitter packer."

state:
  packer:
    _type: step
    address: "local:CellPackStep"
    config:
      place_method: "${place_method}"
      recipe:
        version: "1.0.0"
        format_version: "2.0"
        name: "spheres_demo"
        bounding_box: [[0, 0, 0], [300, 300, 300]]
        objects:
          base:
            type: "single_sphere"
            place_method: "jitter"
            jitter_attempts: 10
            packing_mode: "random"
            max_jitter: [1, 1, 1]
          sphere_a:
            type: "single_sphere"
            inherit: "base"
            color: [0.2, 0.7, 0.4]
            radius: 25
        composition:
          space:
            regions:
              interior: ["A"]
          A:
            object: "sphere_a"
            count: 8
    inputs:
      seed: ["stores", "seed"]
    outputs:
      positions: ["stores", "positions"]
      radii: ["stores", "radii"]
      ingredient_names: ["stores", "ingredient_names"]
      ingredient_colors: ["stores", "ingredient_colors"]
      n_packed: ["stores", "n_packed"]
      packing_fraction: ["stores", "packing_fraction"]
  stores:
    seed: "${seed}"
    positions: []
    radii: []
    ingredient_names: []
    ingredient_colors: []
    n_packed: 0
    packing_fraction: 0.0
  emitter:
    _type: step
    address: "local:RAMEmitter"
    config:
      emit:
        n_packed: "integer"
        packing_fraction: "float"
    inputs:
      n_packed: ["stores", "n_packed"]
      packing_fraction: ["stores", "packing_fraction"]
