name: spheres-demo-with-viz
description: "cellPACK spheres demo with a wired Visualization Step. The packer emits per-update positions/radii/colors; PackingPlots renders an interactive Plotly figure (2D projection + ingredient bar chart) to the 'viz_html' store on every update."

requires:
  processes: [CellPackStep, PackingPlots, RAMEmitter]

parameters:
  seed:
    type: int
    default: 42
    description: "Random seed driving stochastic placement."
  place_method:
    type: string
    default: "jitter"
    description: "cellPACK placement algorithm."
  viz_title:
    type: string
    default: "cellPACK packing"
    description: "Title displayed at the top of the Plotly figure."

state:
  packer:
    _type: step
    address: "local:CellPackStep"
    config:
      place_method: "${place_method}"
      recipe:
        version: "1.0.0"
        format_version: "2.0"
        name: "spheres_demo"
        bounding_box: [[0, 0, 0], [300, 300, 300]]
        objects:
          base:
            type: "single_sphere"
            place_method: "jitter"
            jitter_attempts: 10
            packing_mode: "random"
            max_jitter: [1, 1, 1]
          sphere_a:
            type: "single_sphere"
            inherit: "base"
            color: [0.2, 0.7, 0.4]
            radius: 25
          sphere_b:
            type: "single_sphere"
            inherit: "base"
            color: [0.9, 0.3, 0.2]
            radius: 18
        composition:
          space:
            regions:
              interior: ["A", "B"]
          A:
            object: "sphere_a"
            count: 8
          B:
            object: "sphere_b"
            count: 12
    inputs:
      seed: ["stores", "seed"]
    outputs:
      positions: ["stores", "positions"]
      radii: ["stores", "radii"]
      ingredient_names: ["stores", "ingredient_names"]
      ingredient_colors: ["stores", "ingredient_colors"]
      n_packed: ["stores", "n_packed"]
      packing_fraction: ["stores", "packing_fraction"]
  stores:
    seed: "${seed}"
    positions: []
    radii: []
    ingredient_names: []
    ingredient_colors: []
    n_packed: 0
    packing_fraction: 0.0
    viz_html: ""
  viz:
    _type: step
    address: "local:PackingPlots"
    config:
      title: "${viz_title}"
    inputs:
      positions: ["stores", "positions"]
      radii: ["stores", "radii"]
      ingredient_names: ["stores", "ingredient_names"]
      ingredient_colors: ["stores", "ingredient_colors"]
      n_packed: ["stores", "n_packed"]
      packing_fraction: ["stores", "packing_fraction"]
      time: ["global_time"]
    outputs:
      html: ["stores", "viz_html"]
  emitter:
    _type: step
    address: "local:RAMEmitter"
    config:
      emit:
        n_packed: "integer"
        packing_fraction: "float"
    inputs:
      n_packed: ["stores", "n_packed"]
      packing_fraction: ["stores", "packing_fraction"]
